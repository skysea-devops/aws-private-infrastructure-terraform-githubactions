name: Terraform Plan (Pull Request)

# This workflow runs on pull requests to validate and plan infrastructure changes
# Features:
# - Automatic formatting check
# - Configuration validation
# - Detailed execution plan
# - PR comment with plan results

on:
  pull_request:
    branches:
      - main
      - dev
      - test-phase-4-5
    paths:
      - 'terraform-aws-infra/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write  # Required to post comments on PRs
  id-token: write       # Required for OIDC authentication with AWS

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0
  WORKING_DIR: terraform-aws-infra

jobs:
  terraform-plan:
    name: Plan Infrastructure Changes
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: terraform-aws-infra

    steps:
      # ============================================================
      # Step 1: Setup and Checkout
      # ============================================================
      
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ============================================================
      # Step 2: AWS Authentication
      # ============================================================
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TerraformPlan-PR${{ github.event.number }}

      - name: Verify AWS identity
        run: |
          echo "::group::AWS Identity"
          aws sts get-caller-identity
          echo "::endgroup::"

      # ============================================================
      # Step 3: Terraform Formatting Check
      # ============================================================
      
      - name: Terraform Format Check
        id: fmt
        run: |
          echo "Checking Terraform code formatting..."
          terraform fmt -check -recursive -diff
        continue-on-error: true

      - name: Format check results
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "::warning::Terraform files are not properly formatted"
          echo "Run 'terraform fmt -recursive' locally to fix formatting"

      # ============================================================
      # Step 4: Terraform Initialization
      # ============================================================
      
      - name: Terraform Init
        id: init
        run: |
          echo "Initializing Terraform with remote backend..."
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true" \
            -backend-config="kms_key_id=${{ secrets.KMS_KEY_ARN }}"
          
          echo "✅ Terraform initialized successfully"

      # ============================================================
      # Step 5: Terraform Validation
      # ============================================================
      
      - name: Terraform Validate
        id: validate
        run: |
          echo "Validating Terraform configuration..."
          terraform validate -no-color
          echo "✅ Configuration is valid"

      # ============================================================
      # Step 6: Terraform Plan
      # ============================================================
      
      - name: Terraform Plan
        id: plan
        run: |
          echo "Creating execution plan..."
          terraform plan -no-color -input=false \
            -var="certificate_arn=${{ secrets.CERTIFICATE_ARN }}" \
            -out=tfplan
        env:
          TF_VAR_entra_client_secret: ${{ secrets.ENTRA_CLIENT_SECRET }}
        continue-on-error: true
      
      - name: Display Plan Summary
        if: steps.plan.outcome == 'success'
        run: |
          echo "::group::Plan Summary"
          terraform show -no-color tfplan | grep -E "Plan:|No changes" || echo "Changes detected"
          echo "::endgroup::"

      # ============================================================
      # Step 7: Security and Compliance Checks
      # ============================================================
      
      - name: Check for sensitive data in plan
        if: steps.plan.outcome == 'success'
        run: |
          echo "Scanning plan for potential sensitive data exposure..."
          
          # Check for common sensitive patterns (passwords, keys, etc.)
          if grep -qiE '(password|secret|key|token).*=.*[^*]' plan_output.txt; then
            echo "::warning::Potential sensitive data detected in plan output"
            echo "Review the plan to ensure no secrets are exposed"
          else
            echo "No obvious sensitive data detected"
          fi


      # ============================================================
      # Step 8: Upload Plan Artifact
      # ============================================================
      
      - name: Upload plan artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-pr${{ github.event.number }}
          path: |
            terraform-aws-infra/tfplan
            terraform-aws-infra/plan_output.txt
          retention-days: 5

      # ============================================================
      # Step 9: Final Status Check
      # ============================================================
      
      - name: Terraform plan status
        if: steps.plan.outcome == 'failure'
        run: |
          echo "::error::Terraform plan failed"
          exit 1

      - name: Success notification
        if: success()
        run: |
          echo " All checks passed!"
          echo "The infrastructure changes have been validated successfully."
          echo "Review the plan output above and merge the PR when ready."
