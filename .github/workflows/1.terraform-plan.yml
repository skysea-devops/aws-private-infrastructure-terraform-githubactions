name: Terraform Plan (Pull Request)

# This workflow runs on pull requests to validate and plan infrastructure changes
# Features:
# - Automatic formatting check
# - Configuration validation
# - Detailed execution plan
# - PR comment with plan results

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'terraform-aws-infra/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  contents: read
  pull-requests: write  # Required to post comments on PRs
  id-token: write       # Required for OIDC authentication with AWS

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0
  WORKING_DIR: terraform-aws-infra

jobs:
  terraform-plan:
    name: Plan Infrastructure Changes
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: terraform-aws-infra

    steps:
      # ============================================================
      # Step 1: Setup and Checkout
      # ============================================================
      
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ============================================================
      # Step 2: AWS Authentication
      # ============================================================
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TerraformPlan-PR${{ github.event.number }}

      - name: Verify AWS identity
        run: |
          echo "::group::AWS Identity"
          aws sts get-caller-identity
          echo "::endgroup::"

      # ============================================================
      # Step 3: Terraform Formatting Check
      # ============================================================
      
      - name: Terraform Format Check
        id: fmt
        run: |
          echo "Checking Terraform code formatting..."
          terraform fmt -check -recursive -diff
        continue-on-error: true

      - name: Format check results
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "::warning::Terraform files are not properly formatted"
          echo "Run 'terraform fmt -recursive' locally to fix formatting"

      # ============================================================
      # Step 4: Terraform Initialization
      # ============================================================
      
      - name: Terraform Init
        id: init
        run: |
          echo "Initializing Terraform with remote backend..."
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true" \
            -backend-config="kms_key_id=${{ secrets.KMS_KEY_ARN }}"
          
          echo "✅ Terraform initialized successfully"

      # ============================================================
      # Step 5: Terraform Validation
      # ============================================================
      
      - name: Terraform Validate
        id: validate
        run: |
          echo "Validating Terraform configuration..."
          terraform validate -no-color
          echo "✅ Configuration is valid"

      # ============================================================
      # Step 6: Terraform Plan
      # ============================================================
      
      - name: Terraform Plan
        id: plan
        run: |
          echo "Creating Terraform execution plan..."
          
          # Run plan and capture output
          terraform plan -no-color -input=false \
            -var="kms_key_arn=${{ secrets.KMS_KEY_ARN }}" \
            -var="certificate_arn=${{ secrets.CERTIFICATE_ARN }}" \
            -out=tfplan 2>&1 | tee plan_output.txt
          
          # Check plan status
          PLAN_EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $PLAN_EXIT_CODE -eq 0 ]; then
            echo "✅ Plan created successfully"
          else
            echo "::error::Plan failed with exit code $PLAN_EXIT_CODE"
            exit $PLAN_EXIT_CODE
          fi
        continue-on-error: true

      - name: Generate plan summary
        id: summary
        if: steps.plan.outcome == 'success'
        run: |
          echo "### 📋 Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Extract resource changes
          PLAN_SUMMARY=$(terraform show -no-color tfplan | grep -E "Plan:|No changes")
          echo "$PLAN_SUMMARY" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Add detailed plan (truncated for readability)
          echo "<details><summary>Click to view detailed plan</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```terraform' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan | head -200 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      # ============================================================
      # Step 7: Security and Compliance Checks
      # ============================================================
      
      - name: Check for sensitive data in plan
        if: steps.plan.outcome == 'success'
        run: |
          echo "Scanning plan for potential sensitive data exposure..."
          
          # Check for common sensitive patterns (passwords, keys, etc.)
          if grep -qiE '(password|secret|key|token).*=.*[^*]' plan_output.txt; then
            echo "::warning::Potential sensitive data detected in plan output"
            echo "Review the plan to ensure no secrets are exposed"
          else
            echo "✅ No obvious sensitive data detected"
          fi

      # ============================================================
      # Step 8: Post Plan to PR Comment
      # ============================================================
      
      - name: Post plan to Pull Request
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform-aws-infra/plan_output.txt', 'utf8');
            
            // Truncate plan if too long (GitHub comment limit is 65536 chars)
            const maxLength = 60000;
            const truncatedPlan = planOutput.length > maxLength 
              ? planOutput.substring(0, maxLength) + '\n\n... (output truncated)'
              : planOutput;
            
            // Determine plan status emoji
            const fmtStatus = '${{ steps.fmt.outcome }}' === 'success' ? '✅' : '⚠️';
            const initStatus = '${{ steps.init.outcome }}' === 'success' ? '✅' : '❌';
            const validateStatus = '${{ steps.validate.outcome }}' === 'success' ? '✅' : '❌';
            const planStatus = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            
            const output = `## Terraform Plan Results
            
            | Check | Status |
            |-------|--------|
            | **Format** | ${fmtStatus} \`${{ steps.fmt.outcome }}\` |
            | **Initialization** | ${initStatus} \`${{ steps.init.outcome }}\` |
            | **Validation** | ${validateStatus} \`${{ steps.validate.outcome }}\` |
            | **Plan** | ${planStatus} \`${{ steps.plan.outcome }}\` |
            
            <details><summary><b>📋 Show Plan Output</b></summary>
            
            \`\`\`terraform
            ${truncatedPlan}
            \`\`\`
            
            </details>
            
            ---
            
            **Workflow:** \`${{ github.workflow }}\` | **Event:** \`${{ github.event_name }}\`
            **Triggered by:** @${{ github.actor }} | **Commit:** \`${{ github.sha }}\`
            
            ${planStatus === '✅' ? '✅ **Plan successful!** Review the changes above and merge when ready.' : '❌ **Plan failed!** Check the logs for details.'}
            `;

            // Post or update comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Terraform Plan Results')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            }

      # ============================================================
      # Step 9: Upload Plan Artifact
      # ============================================================
      
      - name: Upload plan artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-pr${{ github.event.number }}
          path: |
            terraform-aws-infra/tfplan
            terraform-aws-infra/plan_output.txt
          retention-days: 5

      # ============================================================
      # Step 10: Final Status Check
      # ============================================================
      
      - name: Terraform plan status
        if: steps.plan.outcome == 'failure'
        run: |
          echo "::error::Terraform plan failed"
          exit 1

      - name: Success notification
        if: success()
        run: |
          echo "✅ All checks passed!"
          echo "The infrastructure changes have been validated successfully."
          echo "Review the plan output above and merge the PR when ready."
