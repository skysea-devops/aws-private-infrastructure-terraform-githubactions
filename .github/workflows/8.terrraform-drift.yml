name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 3 * * *"   # her gün 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write  # Required to post comments on PRs
  id-token: write       # Required for OIDC authentication with AWS

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0
  WORKING_DIR: terraform-aws-infra

jobs:
  drift:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # ============================================================
      # Step 2: AWS Authentication
      # ============================================================
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TerraformDrift

      - name: Verify AWS identity
        run: |
          echo "::group::AWS Identity"
          aws sts get-caller-identity
          echo "::endgroup::"
      # ============================================================
      # Step 6: Terraform commands
      # ============================================================


      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan (Drift Check)
        id: plan
        working-directory: terraform-aws-infra
        run: |
          terraform plan -detailed-exitcode -no-color > plan.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Fail if Terraform Error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      - name: Publish SNS Alert if Drift Detected
        if: steps.plan.outputs.exitcode == '2'
        run: |
          aws sns publish \
            --topic-arn ${{ secrets.SNS_TOPIC_ARN }} \
            --subject " Terraform Drift Detected" \
            --message "Terraform drift detected in production environment. Please review immediately."