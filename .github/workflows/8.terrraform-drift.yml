name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 3 * * *"   # her gün 03:00 UTC
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan (Drift Check)
        id: plan
        run: |
          terraform plan -detailed-exitcode -no-color > plan.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Fail if Terraform Error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      - name: Publish SNS Alert if Drift Detected
        if: steps.plan.outputs.exitcode == '2'
        run: |
          aws sns publish \
            --topic-arn ${{ secrets.SNS_TOPIC_ARN }} \
            --subject " Terraform Drift Detected" \
            --message "Terraform drift detected in production environment. Please review immediately."