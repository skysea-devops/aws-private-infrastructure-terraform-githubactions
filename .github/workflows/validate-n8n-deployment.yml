name: app Deploy (Validate PR + Deploy on Merge)

on:
  push:
    branches: [ "dev" ]
    paths:
      - "docker/**"
      - ".github/workflows/validate-app-deployment.yml"
  
  pull_request:
    branches: [ "dev", "pr-validate-deployment" ]
    paths:
      - "docker/**"
      - ".github/workflows/validate-app-deployment.yml"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ============================================================================
  # VALIDATE (PR only - full deployment simulation)
  # ============================================================================
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml syntax
        run: |
          echo "Validating docker-compose.yml..."
          docker compose -f docker/docker-compose.yml config > /dev/null
          echo "✓ docker-compose.yml syntax is valid"

      - name: Simulate .env file creation
        run: |
          echo "Creating mock .env file..."
          cat > /tmp/app.env << 'EOF'
          app_HOST=test.example.com
          app_ENCRYPTION_KEY=test-key-32-chars-minimum-length
          GENERIC_TIMEZONE=Europe/Istanbul
          
          DB_POSTGRESDB_HOST=test.rds.amazonaws.com
          DB_POSTGRESDB_PORT=5432
          DB_POSTGRESDB_DATABASE=postgres
          DB_POSTGRESDB_USER=testuser
          DB_POSTGRESDB_PASSWORD=testpassword123
          DB_POSTGRESDB_SSL=true
          EOF
          
          echo "✓ .env file structure validated"

      - name: Test docker-compose with .env
        run: |
          echo "Testing docker-compose with .env..."
          cp /tmp/app.env docker/.env
          cd docker
          
          docker compose --env-file .env config > /dev/null
          
          echo "✓ docker-compose can read .env file"

      - name: Test base64 encoding
        run: |
          echo "Testing base64 encoding..."
          
          base64 -w0 docker/docker-compose.yml > /tmp/compose.b64
          base64 -w0 /tmp/app.env > /tmp/env.b64
          
          # Verify decode
          base64 -d /tmp/compose.b64 > /tmp/compose.decoded
          base64 -d /tmp/env.b64 > /tmp/env.decoded
          
          diff docker/docker-compose.yml /tmp/compose.decoded
          diff /tmp/app.env /tmp/env.decoded
          
          echo "✓ Base64 encoding/decoding validated"

      - name: Test image availability
        run: |
          echo "Testing app image..."
          IMAGE=$(docker compose -f docker/docker-compose.yml config | grep 'image:' | head -1 | awk '{print $2}')
          echo "Image: $IMAGE"
          docker pull $IMAGE
          echo "✓ Image is accessible"

      - name: Validation summary
        run: |
          echo ""
          echo "✅ PR VALIDATION PASSED"
          echo ""
          echo "Validated:"
          echo "  ✓ docker-compose.yml syntax"
          echo "  ✓ .env file structure"
          echo "  ✓ docker-compose + .env compatibility"
          echo "  ✓ Base64 encoding"
          echo "  ✓ app image availability"
          echo ""
          echo "Ready to deploy on merge"

  # ============================================================================
  # DEPLOY (push/merge only - using proven working method)
  # ============================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build .env from AWS Secrets Manager 
        env:
          PROJECT: "myproject"  
          ENV: "dev"    
        run: |
          echo "Fetching secrets from AWS Secrets Manager..."
          
          # Get app encryption key from AWS Secrets Manager
          app_KEY=$(aws secretsmanager get-secret-value \
            --secret-id "${{ secrets.PROJECT }}/${{ secrets.ENV }}/app-encryption-key" \
            --query 'SecretString' \
            --output text \
            --region us-east-1)
          
          # Get RDS credentials from AWS Secrets Manager
          RDS_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "${{ secrets.PROJECT }}/${{ secrets.ENV }}/rds-credentials" \
            --query 'SecretString' \
            --output text \
            --region us-east-1)
          
          DB_HOST=$(echo $RDS_SECRET | jq -r '.host')
          DB_PORT=$(echo $RDS_SECRET | jq -r '.port')
          DB_NAME=$(echo $RDS_SECRET | jq -r '.dbname')
          DB_USER=$(echo $RDS_SECRET | jq -r '.username')
          DB_PASS=$(echo $RDS_SECRET | jq -r '.password')
          
          # Build .env from AWS Secrets Manager 
          cat > /tmp/app.env << EOF
          APP_HOST=${{ secrets.app_HOST }}
          APP_ENCRYPTION_KEY=${app_KEY}
          GENERIC_TIMEZONE=Europe/Istanbul

          DB_POSTGRESDB_HOST=${DB_HOST}
          DB_POSTGRESDB_PORT=${DB_PORT}
          DB_POSTGRESDB_DATABASE=${DB_NAME}
          DB_POSTGRESDB_USER=${DB_USER}
          DB_POSTGRESDB_PASSWORD=${DB_PASS}
          DB_POSTGRESDB_SSL=true
          EOF
          
          echo " .env built from AWS Secrets Manager"

      - name: Base64 encode files for safe transfer
        run: |
          base64 -w0 docker/docker-compose.yml > /tmp/compose.b64
          base64 -w0 /tmp/app.env > /tmp/env.b64

      - name: Deploy on EC2 using SSM Run Command
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy app via docker compose" \
            --parameters commands="[
              \"set -e\",
              \"sudo mkdir -p /opt/app\",
              \"sudo chown -R ubuntu:ubuntu /opt/app || true\",
              \"echo $(cat /tmp/compose.b64) | base64 -d > /opt/app/docker-compose.yml\",
              \"echo $(cat /tmp/env.b64) | base64 -d > /opt/app/.env\",
              \"cd /opt/app\",
              \"sudo docker compose version\",
              \"sudo docker compose pull\",
              \"sudo docker compose up -d\",
              \"sudo docker ps --filter name=app\"
            ]" \
            --query "Command.CommandId" --output text)

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM CommandId: $COMMAND_ID"

      - name: Wait & show command output
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --output text


