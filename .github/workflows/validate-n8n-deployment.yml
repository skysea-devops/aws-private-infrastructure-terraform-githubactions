name: n8n Deploy (Validate PR + Deploy on Merge)

on:
  push:
    branches: [ "dev" ]
    paths:
      - "docker/**"
      - ".github/workflows/validate-n8n-deployment.yml"
  
  pull_request:
    branches: [ "dev", "pr-validate-deployment" ]
    paths:
      - "docker/**"
      - ".github/workflows/validate-n8n-deployment.yml"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

