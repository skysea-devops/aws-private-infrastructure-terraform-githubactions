name: Terraform Destroy (Infrastructure Cleanup)

# ⚠️ WARNING: This workflow will DESTROY all infrastructure resources
# Use with extreme caution - this action is irreversible!
#
# This workflow should only be used for:
# - Cleaning up dev/test environments
# - Complete infrastructure teardown
# - Emergency rollback scenarios
#
# DO NOT use this on production without proper backups!

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Environment to destroy (type the environment name to confirm)'
        required: true
        type: string
      confirm_destroy:
        description: 'Type "DESTROY" in all caps to confirm'
        required: true
        type: string
      reason:
        description: 'Reason for destroying infrastructure'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0

jobs:
  # ============================================================
  # Job 1: Safety Checks
  # ============================================================
  
  safety-checks:
    name: Pre-Destroy Safety Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Validate destroy confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "::error::Destroy not confirmed. You must type 'DESTROY' (all caps) to proceed."
            exit 1
          fi
          
          if [ -z "${{ github.event.inputs.reason }}" ]; then
            echo "::error::Reason for destruction is required."
            exit 1
          fi
          
          echo "✅ Destroy confirmed by: ${{ github.actor }}"
          echo "✅ Environment: ${{ github.event.inputs.target_environment }}"
          echo "✅ Reason: ${{ github.event.inputs.reason }}"

      - name: Create destruction notice
        run: |
          echo "## ⚠️ INFRASTRUCTURE DESTRUCTION INITIATED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Initiated by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ github.event.inputs.target_environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Reason** | ${{ github.event.inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # Job 2: Terraform Destroy
  # ============================================================
  
  terraform-destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    needs: safety-checks
    
    # Require manual approval via environment
    environment: 
      name: destroy-approval
    
    defaults:
      run:
        working-directory: terraform-aws-infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-TerraformDestroy-${{ github.run_id }}

      - name: Verify AWS identity
        run: |
          echo "::group::AWS Account Information"
          aws sts get-caller-identity
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "⚠️ Destroying resources in AWS Account: $ACCOUNT_ID"
          echo "::endgroup::"

      - name: Terraform Init
        run: |
          echo "Initializing Terraform..."
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Show current state
        run: |
          echo "Current infrastructure state:"
          terraform show -no-color | head -50

      - name: Terraform Destroy Plan
        id: destroy_plan
        run: |
          echo "Creating destruction plan..."
          terraform plan -destroy -no-color -input=false \
            -var="kms_key_arn=${{ secrets.KMS_KEY_ARN }}" \
            -var="certificate_arn=${{ secrets.CERTIFICATE_ARN }}" \
            -out=destroy.tfplan
          
          echo "### 📋 Destruction Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Resources to be destroyed</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```terraform' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color destroy.tfplan | head -200 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Execute Terraform Destroy
        id: destroy
        run: |
          echo "🗑️ Destroying infrastructure..."
          terraform apply -auto-approve -input=false destroy.tfplan
          echo "✅ Infrastructure destroyed successfully"

      - name: Verify destruction
        if: steps.destroy.outcome == 'success'
        run: |
          echo "Verifying resources are destroyed..."
          
          # Check if state file is empty
          if terraform show -json | jq -e '.values.root_module.resources | length == 0' > /dev/null; then
            echo "✅ All resources have been destroyed"
          else
            echo "⚠️ Some resources may still exist - manual cleanup may be required"
          fi

      - name: Destruction summary
        if: steps.destroy.outcome == 'success'
        run: |
          echo "## ✅ Infrastructure Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All infrastructure resources have been destroyed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Important Notes:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- The remote state file still exists in S3" >> $GITHUB_STEP_SUMMARY
          echo "- DynamoDB state lock table is preserved" >> $GITHUB_STEP_SUMMARY
          echo "- KMS keys are preserved (with deletion window)" >> $GITHUB_STEP_SUMMARY
          echo "- To completely remove everything, run the bootstrap destroy workflow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 To Rebuild:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Ensure all GitHub Secrets are still configured" >> $GITHUB_STEP_SUMMARY
          echo "2. Create a new PR with infrastructure code" >> $GITHUB_STEP_SUMMARY
          echo "3. Merge to trigger automatic deployment" >> $GITHUB_STEP_SUMMARY

      - name: Handle destroy failure
        if: failure()
        run: |
          echo "::error::Terraform destroy failed!"
          echo "## ❌ Destruction Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Possible Issues:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Resources have dependencies that must be removed first" >> $GITHUB_STEP_SUMMARY
          echo "- Some resources have deletion protection enabled" >> $GITHUB_STEP_SUMMARY
          echo "- State file is out of sync with actual infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Manual Cleanup May Be Required:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Check AWS Console for remaining resources" >> $GITHUB_STEP_SUMMARY
          echo "2. Remove resources manually if needed" >> $GITHUB_STEP_SUMMARY
          echo "3. Update state: \`terraform refresh\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Re-run destroy workflow" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # Job 3: Cleanup Bootstrap Resources (Optional)
  # ============================================================
  
  destroy-bootstrap:
    name: Destroy Bootstrap Resources (Optional)
    runs-on: ubuntu-latest
    needs: terraform-destroy
    if: github.event.inputs.target_environment == 'bootstrap'
    
    environment: 
      name: destroy-bootstrap-approval
    
    defaults:
      run:
        working-directory: terraform-remote-state

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init (local backend)
        run: terraform init

      - name: Destroy bootstrap infrastructure
        run: |
          echo "🗑️ Destroying bootstrap resources..."
          terraform destroy -auto-approve \
            -var="tf_state_bucket_name=${{ secrets.TF_STATE_BUCKET }}"
          
          echo "✅ Bootstrap resources destroyed"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚠️ Bootstrap Resources Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following resources have been deleted:" >> $GITHUB_STEP_SUMMARY
          echo "- S3 bucket for Terraform state" >> $GITHUB_STEP_SUMMARY
          echo "- DynamoDB table for state locking" >> $GITHUB_STEP_SUMMARY
          echo "- KMS key (scheduled for deletion)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **GitHub Secrets should be removed manually**" >> $GITHUB_STEP_SUMMARY
